name: QA Jobs Search Bot

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write  # Needed to push changes to posted_jobs.json
  actions: read

jobs:
  search-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Leave 5 min buffer before next scheduled run
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0  # Need full history for commits
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: requirements.txt
       
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list  # Log installed packages for debugging
        
    - name: Run job search bot
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        set -e  # Exit on error
        echo "🚀 Starting QA Jobs Bot at $(date -u)"
        python qa_jobs_bot.py
        echo "✅ Bot completed successfully at $(date -u)"
      continue-on-error: true  # Don't fail workflow if bot has issues
      timeout-minutes: 20  # Give bot 20 minutes max
        
    - name: Commit and push if changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add posted_jobs.json
        
        # Check if there are changes
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        # Commit changes
        git commit -m "Update posted jobs tracking [skip ci]" -m "Automated update by QA Jobs Bot at $(date -u)"
        
        # Push changes
        if git push; then
          echo "✅ Successfully pushed changes to posted_jobs.json"
        else
          echo "⚠️ Could not push changes - will retry on next run"
          exit 0  # Don't fail workflow
        fi

    - name: Log completion
      if: always()
      run: |
        echo "Job completed at $(date -u)"
        echo "Workflow status: ${{ job.status }}"
